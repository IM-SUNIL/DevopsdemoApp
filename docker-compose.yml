version: '3.8'

services:
  db:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - FRONTEND_URL=https://devops.sunilsinghrajput.in
      - DATABASE_URL=postgresql://postgres:sqladmin@database-1.c5e8qgwkw8xh.ap-south-1.rds.amazonaws.com:5432/postgres?schema=public
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://devops.sunilsinghrajput.in/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: always
